name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [master]

# Минимальные права по умолчанию; конкретные права заданы внутри job (требование Scorecard)
permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    # Scorecard требует объявлять security-events/id-token именно на уровне job, а не глобально
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
